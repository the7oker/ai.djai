<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f23">
  <title>Music AI DJ</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <h1>Music AI DJ</h1>
      <div class="connection-dot" id="connDot" title="HQPlayer connection"></div>
    </header>

    <!-- Now Playing -->
    <section class="now-playing" id="nowPlaying">
      <div class="np-song np-idle" id="npSong">Not connected</div>
      <div class="np-artist" id="npArtist"></div>
      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-time" id="progressTime">00:00 / 00:00</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="playerCmd('previous')" title="Previous">&#9198;</button>
        <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="togglePlayPause()" title="Play/Pause">&#9654;</button>
        <button class="ctrl-btn" onclick="playerCmd('next')" title="Next">&#9197;</button>
        <button class="ctrl-btn" onclick="playerCmd('stop')" title="Stop">&#9632;</button>
      </div>
      <div class="volume-row">
        <button class="vol-btn" onclick="playerCmd('volume/down')">&#128265;</button>
        <span class="vol-label" id="volLabel">-- dB</span>
        <button class="vol-btn" onclick="playerCmd('volume/up')">&#128266;</button>
      </div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="search" onclick="switchTab('search')">Search</button>
      <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">AI DJ</button>
      <button class="tab-btn" data-tab="queue" onclick="switchTab('queue')">Queue</button>
    </div>

    <!-- Search Tab -->
    <div class="tab-content active" id="tab-search">
      <form class="search-form" onsubmit="doSearch(event)">
        <input type="text" class="search-input" id="searchInput" placeholder="Artist, album, or track..." autocomplete="off">
        <button type="submit" class="submit-btn">Go</button>
      </form>
      <div id="searchResults">
        <div class="empty-state">Search your music library</div>
      </div>
    </div>

    <!-- AI DJ Tab -->
    <div class="tab-content" id="tab-chat">
      <div class="session-bar" id="sessionBar">
        <div class="session-list" id="sessionList"></div>
        <button class="new-chat-btn" onclick="startNewChat()">+ New</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">Ask the AI DJ for recommendations</div>
      </div>
      <div class="chat-bottom">
        <div class="model-selector">
          <button class="model-btn active" data-model="sonnet" onclick="selectModel('sonnet')">Sonnet</button>
          <button class="model-btn" data-model="haiku" onclick="selectModel('haiku')">Haiku</button>
        </div>
        <form class="chat-form" onsubmit="sendChat(event)">
          <input type="text" class="search-input" id="chatInput" placeholder="What should I play?" autocomplete="off">
          <button type="submit" class="submit-btn" id="chatSendBtn">&#10148;</button>
        </form>
      </div>
    </div>

    <!-- Queue Tab -->
    <div class="tab-content" id="tab-queue">
      <div id="queueContent">
        <div class="empty-state">No tracks in queue</div>
      </div>
    </div>

  </div>

  <script src="/static/app.js?v=7"></script>
</body>
</html>
